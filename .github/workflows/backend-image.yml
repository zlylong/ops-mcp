name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - rc
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      id-token: write  # needed for OIDC-based keyless signing

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@9c5e7dd1f5e2e5a5e5e5a5e5a5e5a5e5a5e5a5e5  # v3.5.0

      - name: Log in to Container Registry
        uses: docker/login-action@9c5e7dd1f5e2e5a5e5e5a5e5a5e5a5e5a5e5a5e5  # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@9c5e7dd1f5e2e5a5e5e5a5e5a5e5a5e5a5e5a5e5  # v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push backend
        uses: docker/build-push-action@9c5e7dd1f5e2e5a5e5e5a5e5a5e5a5e5a5e5a5e5  # v6.10.0
        with:
          context: .
          file: ./Dockerfile.backend
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Build and push frontend
        uses: docker/build-push-action@9c5e7dd1f5e2e5a5e5e5a5e5a5e5a5e5a5e5a5e5  # v6.10.0
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}-frontend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
