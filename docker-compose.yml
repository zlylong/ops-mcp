name: darwin-ops-mcp

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/zlylong/ops-mcp-backend:main}
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_BINARY_BASE_URL: ${BACKEND_BINARY_BASE_URL:-https://github.com/zlylong/darwin-ops-mcp/releases/download/backend-main}
    pull_policy: ${BACKEND_PULL_POLICY:-missing}
    environment:
      DARWIN_OPS_MCP_ADDR: ":8080"
      DARWIN_OPS_MCP_MODE: "${DARWIN_OPS_MCP_MODE:-mock}"
      DARWIN_OPS_MCP_ENV: "development"
      DARWIN_OPS_MCP_SEED_MOCK: "true"
      DARWIN_OPS_MCP_API_TOKEN: "${DARWIN_OPS_MCP_API_TOKEN:-}"
      DATABASE_URL: "postgres://darwin_ops_mcp:darwin_ops_mcp@postgres:5432/darwin_ops_mcp?sslmode=disable"
    ports:
      - "8080:8080"
    volumes:
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: darwin_ops_mcp
      POSTGRES_PASSWORD: darwin_ops_mcp
      POSTGRES_DB: darwin_ops_mcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darwin_ops_mcp -d darwin_ops_mcp"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
