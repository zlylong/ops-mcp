info:
  contact: {}
paths:
  /tools:
    post:
      consumes:
      - application/json
      description: Creates a custom tool definition in the runtime registry
      parameters:
      - description: Tool definition
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create Tool
      tags:
      - tools
  /tools/{name}:
    delete:
      description: Deletes an existing tool definition from the runtime registry
      parameters:
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete Tool
      tags:
      - tools
    put:
      consumes:
      - application/json
      description: Updates an existing tool definition in the runtime registry
      parameters:
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      - description: Tool definition
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update Tool
      tags:
      - tools
  /tools/{name}/execute:
    post:
      consumes:
      - application/json
      description: Executes a tool with the provided parameters. Returns 202 if approval
      parameters:
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      - description: Execution request
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "202":
          description: Accepted
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute Tool
      tags:
      - tools
swagger: "2.0"
