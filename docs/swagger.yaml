host: localhost:8080
info:
  contact:
    email: support@darwin-ops-mcp.local
    name: API Support
    url: http://localhost:8080
  description: |-
    Darwin Ops MCP Backend API with Tool Registry, Policy Engine, and Approval Flow.
    Returns immediate execution result or 202 + approval ID for high-risk tools.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Darwin Ops MCP API
  version: "1.0"
paths:
  /api/v1/agent-keys:
    get:
      description: Lists API key metadata. Plaintext secrets and hashes are never
        returned.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List Agent API Keys
      tags:
      - agent-keys
    post:
      consumes:
      - application/json
      description: Issues a bearer token for an AI agent. Requires the master API
        token when authentication is enabled.
      parameters:
      - description: Agent API key issuance request
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create Agent API Key
      tags:
      - agent-keys
  /api/v1/agent-keys/{id}/revoke:
    post:
      description: Revokes an agent API key by ID. Revoked keys can no longer authenticate.
      parameters:
      - description: Agent API key ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Revoke Agent API Key
      tags:
      - agent-keys
  /api/v1/applications:
    get:
      description: Returns all tool access applications in creation order (newest
        last).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
      summary: List Applications
      tags:
      - applications
    post:
      consumes:
      - application/json
      description: Applies for access to a tool with a specific risk level, role,
        and reason.
      parameters:
      - description: Tool application request
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Submit Tool Application
      tags:
      - applications
  /api/v1/applications/{id}/approve:
    post:
      description: Approves a pending tool access application and records the decision
        timestamp.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.ToolApplication'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Approve Tool Application
      tags:
      - applications
  /api/v1/applications/{id}/reject:
    post:
      description: Rejects a pending tool access application and records the decision
        timestamp.
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.ToolApplication'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reject Tool Application
      tags:
      - applications
  /api/v1/approvals:
    get:
      description: Returns all execution approval records.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.Approval'
            type: array
      summary: List Execution Approvals
      tags:
      - approvals
  /api/v1/approvals/{id}/approve:
    post:
      description: Marks a pending execution approval as approved.
      parameters:
      - description: Approval ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.Approval'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Approve Execution Approval
      tags:
      - approvals
  /api/v1/approvals/{id}/reject:
    post:
      description: Marks a pending execution approval as rejected.
      parameters:
      - description: Approval ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.Approval'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Reject Execution Approval
      tags:
      - approvals
  /api/v1/audit:
    get:
      description: Returns all audit records.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.AuditRecord'
            type: array
      summary: List Audit Records
      tags:
      - audit
  /api/v1/dashboard/summary:
    get:
      description: Returns summary counts for tools, executions, audit records, and
        approvals.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Dashboard Summary
      tags:
      - dashboard
  /api/v1/executions:
    get:
      description: Returns all execution records.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.Execution'
            type: array
      summary: List Executions
      tags:
      - executions
  /api/v1/executions/{id}:
    get:
      description: Returns an execution record by ID.
      parameters:
      - description: Execution ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.Execution'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Execution
      tags:
      - executions
  /api/v1/tools:
    get:
      description: Returns all registered tools.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.Tool'
            type: array
      summary: List Tools
      tags:
      - tools
    post:
      consumes:
      - application/json
      description: Creates a custom tool definition in the runtime registry
      parameters:
      - description: Tool definition
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create Tool
      tags:
      - tools
  /api/v1/tools/{name}:
    delete:
      description: Deletes an existing tool definition from the runtime registry
      parameters:
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete Tool
      tags:
      - tools
    get:
      description: Returns a single registered tool by name.
      parameters:
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zlylong_darwin-ops-mcp_backend_internal_domain.Tool'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Tool
      tags:
      - tools
    put:
      consumes:
      - application/json
      description: Updates an existing tool definition in the runtime registry
      parameters:
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      - description: Tool definition
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update Tool
      tags:
      - tools
  /api/v1/tools/{name}/execute:
    post:
      consumes:
      - application/json
      description: Executes a tool with the provided parameters. Returns 202 if approval
      parameters:
      - description: Tool name
        in: path
        name: name
        required: true
        type: string
      - description: Execution request
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "202":
          description: Accepted
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Execute Tool
      tags:
      - tools
  /healthz:
    get:
      description: Returns backend runtime health and object counts.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health Check
      tags:
      - system
swagger: "2.0"
